services:
  - type: web
    name: gcm-bananeiras
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gcm-bananeiras-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://gcm-bananeiras.onrender.com

databases:
  - name: gcm-bananeiras-db
    databaseName: gcm_bananeiras
    user: gcm_user
    plan: free
