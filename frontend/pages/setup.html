<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Configuração Inicial - GCM Bananeiras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css?v=4">
  <script src="../assets/js/theme-switcher.js?v=2"></script>
</head>
<body>
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <div class="header-titulo">
      <span class="header-linha-1">PREFEITURA MUNICIPAL DE BANANEIRAS</span>
      <span class="header-linha-2">GUARDA CIVIL MUNICIPAL</span>
      <span class="header-linha-3">Secretaria de Administração Pública Municipal</span>
    </div>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <main class="login-container">
    <h2>Criar Administrador</h2>
    <p style="text-align:center; margin-bottom:16px; color:var(--color-text-muted); font-size:0.9rem;">
      Esta página só funciona uma vez, enquanto não houver nenhum usuário cadastrado.
    </p>
    <div id="msg" style="display:none; padding:10px; border-radius:var(--radius-sm); margin-bottom:12px; text-align:center;"></div>
    <form onsubmit="criarAdmin(event)">
      <input type="text" id="usuario" placeholder="Nome de usuário" required autocomplete="off">
      <input type="password" id="senha" placeholder="Senha" required>
      <input type="password" id="confirmar" placeholder="Confirmar senha" required>
      <small class="senha-regras" style="display:block;color:var(--color-text-muted);font-size:0.78rem;margin:-4px 0 12px;"></small>
      <button type="submit" id="btn">Criar Administrador</button>
    </form>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/senha.js"></script>
  <script>
    async function criarAdmin(e) {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value.trim();
      const senha = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');

      if (senha !== confirmar) {
        mostrarMsg('As senhas não coincidem.', 'erro');
        return;
      }

      const erroSenha = validarSenhaCliente(senha);
      if (erroSenha) {
        mostrarMsg(erroSenha, 'erro');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Aguarde...';

      try {
        const res = await fetch(`${API_BASE_URL}/api/auth/setup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, senha })
        });
        const data = await res.json();

        if (res.ok) {
          mostrarMsg('Administrador criado! Redirecionando para o login...', 'ok');
          setTimeout(() => window.location.href = '/', 2000);
        } else {
          mostrarMsg(data.error || 'Erro ao criar administrador.', 'erro');
          btn.disabled = false;
          btn.textContent = 'Criar Administrador';
        }
      } catch (err) {
        mostrarMsg('Erro de conexão com o servidor.', 'erro');
        btn.disabled = false;
        btn.textContent = 'Criar Administrador';
      }
    }

    function mostrarMsg(texto, tipo) {
      const msg = document.getElementById('msg');
      msg.textContent = texto;
      msg.style.display = 'block';
      msg.style.background = tipo === 'ok' ? '#d4edda' : '#f8d7da';
      msg.style.color = tipo === 'ok' ? '#155724' : '#721c24';
    }
  </script>
</body>
</html>
