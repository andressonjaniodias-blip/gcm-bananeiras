<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Férias - GCM Bananeiras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme-switcher.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <style>
    .obrigatorio::after { content:' *'; color:var(--color-danger); }
    .grid-form { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
    .fer-card { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--color-row-alt);
      border:1px solid var(--color-border); border-radius:var(--radius-sm); margin-bottom:8px; }
    .fer-card .fc-body { flex:1; min-width:0; }
    .fer-card .fc-nome { font-weight:700; }
    .fer-card .fc-meta { font-size:0.82rem; color:var(--color-text-muted); }
    .fer-card button { border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:0.78rem;font-weight:600; }
    .msg { padding:10px; border-radius:6px; margin-top:10px; display:none; font-size:0.88rem; }
  </style>
</head>
<body>
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <div class="header-titulo">
      <span class="header-linha-1">PREFEITURA MUNICIPAL DE BANANEIRAS</span>
      <span class="header-linha-2">GUARDA CIVIL MUNICIPAL</span>
      <span class="header-linha-3">Escala de Férias</span>
    </div>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <main class="dashboard">
    <h3>Registrar Férias</h3>
    <div class="grid-form">
      <div class="campo-group"><label>Agente</label><select id="selAgente" onchange="onSel()"></select></div>
      <div class="campo-group"><label class="obrigatorio">Nome</label><input type="text" id="fNome"></div>
      <div class="campo-group"><label>Matrícula</label><input type="text" id="fMatricula"></div>
      <div class="campo-group"><label class="obrigatorio">Início</label><input type="date" id="fInicio"></div>
      <div class="campo-group"><label class="obrigatorio">Término</label><input type="date" id="fFim"></div>
      <div class="campo-group" style="grid-column:1/-1;"><label>Observações</label><input type="text" id="fObs"></div>
    </div>
    <div class="actions" style="gap:10px;flex-wrap:wrap;">
      <button id="btnSalvar" onclick="salvar()" style="background:var(--color-success);">Registrar</button>
      <button onclick="cancelarEdicao()" id="btnCancelar" style="display:none;">Cancelar edição</button>
    </div>
    <p id="msg" class="msg"></p>

    <hr style="margin:18px 0;border:none;border-top:1px solid var(--color-border);">

    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
      <div class="campo-group" style="margin:0;"><label>Filtrar por mês</label><input type="month" id="mesFiltro" onchange="carregar()"></div>
      <button onclick="limparFiltro()" class="btn-limpar">Ver todos</button>
      <button onclick="pdf()" style="background:var(--color-primary);">Gerar PDF</button>
    </div>
    <div id="lista" style="margin-top:12px;"><p style="color:var(--color-hint);text-align:center;">Carregando...</p></div>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    let PERFIL={}, AGENTES=[], EDIT_ID=null;
    function msg(t,ok){ const e=document.getElementById('msg'); e.textContent=t; e.style.display='block';
      e.style.background=ok?'#dcfce7':'#fee2e2'; e.style.color=ok?'#166534':'#991b1b'; setTimeout(()=>e.style.display='none',5000); }
    function fmt(iso){ if(!iso)return'—'; const[y,m,d]=String(iso).slice(0,10).split('-'); return `${d}/${m}/${y}`; }

    window.addEventListener('DOMContentLoaded', async()=>{
      try{ const me=await fetch(`${API_BASE_URL}/api/auth/me`,{credentials:'include'}); if(!me.ok){window.location.href='/';return;}
        PERFIL=await me.json(); sessionStorage.setItem('perfil',JSON.stringify(PERFIL)); if(typeof updateSidebarUser==='function') updateSidebarUser(PERFIL);
      }catch{ window.location.href='/'; return; }
      try{ const r=await fetch(`${API_BASE_URL}/api/agentes`,{credentials:'include'}); if(r.ok) AGENTES=await r.json(); }catch{}
      document.getElementById('selAgente').innerHTML='<option value="">— selecione —</option>'+AGENTES.map(a=>`<option value="${a.id}">${a.nome}${a.matricula?' ('+a.matricula+')':''}</option>`).join('');
      carregar();
    });

    function onSel(){ const a=AGENTES.find(x=>String(x.id)===document.getElementById('selAgente').value);
      if(a){ document.getElementById('fNome').value=a.nome||''; document.getElementById('fMatricula').value=a.matricula||''; } }

    async function salvar(){
      const nome=document.getElementById('fNome').value.trim();
      const ini=document.getElementById('fInicio').value, fim=document.getElementById('fFim').value;
      if(!nome||!ini||!fim){ msg('Preencha nome, início e término.',false); return; }
      const payload={ agente_id:document.getElementById('selAgente').value?Number(document.getElementById('selAgente').value):null,
        nome, matricula:document.getElementById('fMatricula').value.trim(), data_inicio:ini, data_fim:fim, obs:document.getElementById('fObs').value.trim() };
      const url = EDIT_ID ? `${API_BASE_URL}/api/ferias/${EDIT_ID}` : `${API_BASE_URL}/api/ferias`;
      const method = EDIT_ID ? 'PUT' : 'POST';
      try{ const r=await fetch(url,{method,credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const d=await r.json(); if(!r.ok){ msg(d.error||'Erro.',false); return; }
        msg(EDIT_ID?'Férias atualizadas!':'Férias registradas!',true); cancelarEdicao(); limparCampos(); carregar();
      }catch{ msg('Erro de conexão.',false); }
    }
    function limparCampos(){ ['fNome','fMatricula','fInicio','fFim','fObs'].forEach(id=>document.getElementById(id).value=''); document.getElementById('selAgente').value=''; }

    async function carregar(){
      const cont=document.getElementById('lista'); const mes=document.getElementById('mesFiltro').value;
      const url = mes ? `${API_BASE_URL}/api/ferias?mes=${mes}` : `${API_BASE_URL}/api/ferias`;
      try{ const r=await fetch(url,{credentials:'include'}); const l=await r.json();
        if(!l.length){ cont.innerHTML='<p style="color:var(--color-hint);text-align:center;">Nenhum registro.</p>'; return; }
        cont.innerHTML=l.map(f=>{ const dias=Math.round((new Date(f.data_fim)-new Date(f.data_inicio))/86400000)+1;
          return `<div class="fer-card"><div class="fc-body"><div class="fc-nome">${f.nome}${f.matricula?' <span style="font-weight:400;color:var(--color-text-muted)">— '+f.matricula+'</span>':''}</div>
          <div class="fc-meta">${fmt(f.data_inicio)} a ${fmt(f.data_fim)} · ${dias} dia(s)${f.obs?' · '+f.obs:''}</div></div>
          <button style="background:var(--color-primary);color:#fff;" onclick='editar(${JSON.stringify(f).replace(/'/g,"&#39;")})'>Editar</button>
          <button style="background:var(--color-danger);color:#fff;" onclick="excluir(${f.id})">Excluir</button></div>`;
        }).join('');
      }catch{ cont.innerHTML='<p style="color:var(--color-danger);text-align:center;">Erro.</p>'; }
    }

    function editar(f){ EDIT_ID=f.id; document.getElementById('fNome').value=f.nome||''; document.getElementById('fMatricula').value=f.matricula||'';
      document.getElementById('fInicio').value=String(f.data_inicio).slice(0,10); document.getElementById('fFim').value=String(f.data_fim).slice(0,10);
      document.getElementById('fObs').value=f.obs||''; document.getElementById('btnSalvar').textContent='Salvar alterações';
      document.getElementById('btnCancelar').style.display='inline-block'; window.scrollTo({top:0,behavior:'smooth'}); }
    function cancelarEdicao(){ EDIT_ID=null; document.getElementById('btnSalvar').textContent='Registrar'; document.getElementById('btnCancelar').style.display='none'; }
    async function excluir(id){ if(!confirm('Excluir este registro de férias?'))return; const r=await fetch(`${API_BASE_URL}/api/ferias/${id}`,{method:'DELETE',credentials:'include'}); if(r.ok) carregar(); }
    function limparFiltro(){ document.getElementById('mesFiltro').value=''; carregar(); }
    async function pdf(){ const mes=document.getElementById('mesFiltro').value; const url = mes?`${API_BASE_URL}/api/ferias/pdf?mes=${mes}`:`${API_BASE_URL}/api/ferias/pdf`;
      try{ const res=await fetch(url,{credentials:'include'}); if(!res.ok){alert('Erro ao gerar PDF.');return;} const b=await res.blob(); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=mes?`ferias-${mes}.pdf`:'ferias.pdf'; a.click(); URL.revokeObjectURL(u);}catch{alert('Erro.');} }
  </script>
</body>
</html>
