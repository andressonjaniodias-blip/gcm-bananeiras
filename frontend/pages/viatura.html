<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Viatura - GCM Bananeiras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme-switcher.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <style>
    .obrigatorio::after { content: ' *'; color: var(--color-danger); }
  </style>
</head>
<body>
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <div class="header-titulo">
      <span class="header-linha-1">GUARDA CIVIL MUNICIPAL</span>
      <span class="header-linha-2">SISTEMA ONLINE</span>
      <span class="header-linha-3">PREFEITURA MUNICIPAL DE BANANEIRAS</span>
    </div>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <main class="dashboard">
    <nav class="tabs">
      <button class="tab-btn active" onclick="showViatTab('registrar')">Registrar</button>
      <button class="tab-btn" onclick="showViatTab('historico')">Histórico</button>
    </nav>

    <!-- REGISTRAR -->
    <section id="registrar" class="tab-content">

      <div class="campo-group">
        <label class="obrigatorio">Tipo de Registro</label>
        <div class="viatura-tipo-tabs">
          <button type="button" class="viatura-tipo-btn active" onclick="setTipo('abastecimento', this)">Abastecimento</button>
          <button type="button" class="viatura-tipo-btn" onclick="setTipo('revisao', this)">Revisão</button>
          <button type="button" class="viatura-tipo-btn" onclick="setTipo('manutencao', this)">Manutenção</button>
        </div>
        <input type="hidden" id="tipoRegistro" value="abastecimento">
      </div>

      <!-- Campos comuns -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;flex-wrap:wrap;">
        <div class="campo-group">
          <label class="obrigatorio">Código da Viatura</label>
          <input type="text" id="viatCodigo" placeholder="Ex: GCM-01" required maxlength="30">
        </div>
        <div class="campo-group">
          <label class="obrigatorio">Data / Hora</label>
          <input type="datetime-local" id="viatDataHora" required>
        </div>
        <div class="campo-group">
          <label class="obrigatorio">KM Atual</label>
          <input type="number" id="viatKm" placeholder="Ex: 45320" min="0" required>
        </div>
        <div class="campo-group">
          <label class="obrigatorio">Responsável</label>
          <input type="text" id="viatResponsavel" readonly style="background:var(--color-bloco-bg);font-weight:600;">
        </div>
      </div>

      <!-- Abastecimento -->
      <div id="secAbastecimento" class="viatura-section active">
        <h3 style="margin-bottom:14px;">Dados do Abastecimento</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="campo-group">
            <label class="obrigatorio">Litros Abastecidos</label>
            <input type="number" id="viatLitros" placeholder="Ex: 40.5" min="0" step="0.01">
          </div>
          <div class="campo-group">
            <label>Tipo de Combustível</label>
            <select id="viatCombustivel">
              <option value="">Selecione</option>
              <option>Gasolina Comum</option>
              <option>Gasolina Aditivada</option>
              <option>Etanol</option>
              <option>Diesel S-10</option>
              <option>Diesel Comum</option>
              <option>GNV</option>
            </select>
          </div>
          <div class="campo-group">
            <label>Valor por Litro (R$)</label>
            <input type="number" id="viatValorLitro" placeholder="Ex: 5.89" min="0" step="0.01">
          </div>
          <div class="campo-group">
            <label>Posto / Local</label>
            <input type="text" id="viatPosto" placeholder="Nome do posto" maxlength="150">
          </div>
        </div>
      </div>

      <!-- Revisão -->
      <div id="secRevisao" class="viatura-section">
        <h3 style="margin-bottom:14px;">Dados da Revisão</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="campo-group">
            <label>Tipo de Revisão</label>
            <select id="viatTipoRevisao">
              <option value="">Selecione</option>
              <option>Revisão Preventiva</option>
              <option>Revisão de 10.000 km</option>
              <option>Revisão de 20.000 km</option>
              <option>Revisão de 30.000 km</option>
              <option>Inspeção Geral</option>
            </select>
          </div>
          <div class="campo-group">
            <label>Oficina / Local</label>
            <input type="text" id="viatOficinaRev" placeholder="Nome da oficina" maxlength="150">
          </div>
          <div class="campo-group">
            <label>Próxima Revisão (KM)</label>
            <input type="number" id="viatProximaRev" placeholder="Ex: 55000" min="0">
          </div>
          <div class="campo-group">
            <label>Valor Total (R$)</label>
            <input type="number" id="viatValorRev" placeholder="Ex: 450.00" min="0" step="0.01">
          </div>
        </div>
        <div class="campo-group">
          <label>Itens Revisados</label>
          <textarea id="viatItensRev" rows="3" placeholder="Ex: Troca de óleo, filtros, verificação de freios..."></textarea>
        </div>
      </div>

      <!-- Manutenção -->
      <div id="secManutencao" class="viatura-section">
        <h3 style="margin-bottom:14px;">Dados da Manutenção</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="campo-group">
            <label class="obrigatorio">Problema / Motivo</label>
            <input type="text" id="viatProblema" placeholder="Ex: Falha no alternador" maxlength="200">
          </div>
          <div class="campo-group">
            <label>Oficina / Local do Serviço</label>
            <input type="text" id="viatOficinaMan" placeholder="Nome da oficina" maxlength="150">
          </div>
          <div class="campo-group">
            <label>Peças Substituídas</label>
            <input type="text" id="viatPecas" placeholder="Ex: Alternador, correia dentada" maxlength="300">
          </div>
          <div class="campo-group">
            <label>Valor Total (R$)</label>
            <input type="number" id="viatValorMan" placeholder="Ex: 1200.00" min="0" step="0.01">
          </div>
        </div>
        <div class="campo-group">
          <label>Descrição do Serviço</label>
          <textarea id="viatDescricaoMan" rows="3" placeholder="Descreva o serviço realizado..."></textarea>
        </div>
      </div>

      <div class="campo-group">
        <label>Observações</label>
        <textarea id="viatObs" rows="2" placeholder="Observações adicionais..."></textarea>
      </div>

      <div class="actions">
        <button onclick="salvarViatura()" style="background:var(--color-success);">Registrar</button>
      </div>
      <p id="msgViatura" class="msg" style="margin-top:12px;"></p>
    </section>

    <!-- HISTÓRICO -->
    <section id="historico" class="tab-content hidden">
      <h3>Registros de Viatura</h3>
      <div class="filters" style="margin-bottom:16px;">
        <input type="text" id="buscarViat" placeholder="Código da viatura...">
        <select id="filtroTipoViat" style="padding:8px 12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-input-bg);color:var(--color-text);">
          <option value="">Todos os tipos</option>
          <option value="abastecimento">Abastecimento</option>
          <option value="revisao">Revisão</option>
          <option value="manutencao">Manutenção</option>
        </select>
        <button onclick="filtrarViatura()">Filtrar</button>
        <button class="btn-limpar" onclick="limparFiltroViat()">Limpar</button>
      </div>
      <div id="listaViatura">
        <p style="text-align:center;color:var(--color-hint);">Carregando...</p>
      </div>
    </section>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    let todosRegistros = [];

    window.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('viatDataHora').value = new Date().toISOString().slice(0, 16);
      await new Promise(r => setTimeout(r, 300));
      const perfil = JSON.parse(sessionStorage.getItem('perfil') || '{}');
      if (perfil.usuario) document.getElementById('viatResponsavel').value = perfil.usuario;
      carregarViatura();
    });

    function showViatTab(id) {
      document.querySelectorAll('#registrar, #historico').forEach(s => s.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.remove('hidden');
      event?.target?.classList.add('active');
      if (id === 'historico') renderizarViatura(todosRegistros);
    }

    function setTipo(tipo, btn) {
      document.getElementById('tipoRegistro').value = tipo;
      document.querySelectorAll('.viatura-tipo-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.viatura-section').forEach(s => s.classList.remove('active'));
      document.getElementById('sec' + tipo.charAt(0).toUpperCase() + tipo.slice(1)).classList.add('active');
    }

    async function salvarViatura() {
      const tipo        = document.getElementById('tipoRegistro').value;
      const codigo      = document.getElementById('viatCodigo').value.trim();
      const dataHora    = document.getElementById('viatDataHora').value;
      const km          = document.getElementById('viatKm').value;
      const responsavel = document.getElementById('viatResponsavel').value.trim();

      if (!codigo || !dataHora || !km) {
        mostrarMsgViat('Preencha os campos obrigatórios.', 'danger'); return;
      }

      const payload = {
        tipo, codigo, dataHora, km: parseInt(km), responsavel,
        obs: document.getElementById('viatObs').value.trim(),
        dados: {},
      };

      if (tipo === 'abastecimento') {
        payload.dados = {
          litros:      document.getElementById('viatLitros').value,
          combustivel: document.getElementById('viatCombustivel').value,
          valorLitro:  document.getElementById('viatValorLitro').value,
          posto:       document.getElementById('viatPosto').value.trim(),
        };
      } else if (tipo === 'revisao') {
        payload.dados = {
          tipoRevisao: document.getElementById('viatTipoRevisao').value,
          oficina:     document.getElementById('viatOficinaRev').value.trim(),
          proximaKm:   document.getElementById('viatProximaRev').value,
          valor:       document.getElementById('viatValorRev').value,
          itens:       document.getElementById('viatItensRev').value.trim(),
        };
      } else {
        payload.dados = {
          problema:  document.getElementById('viatProblema').value.trim(),
          oficina:   document.getElementById('viatOficinaMan').value.trim(),
          pecas:     document.getElementById('viatPecas').value.trim(),
          valor:     document.getElementById('viatValorMan').value,
          descricao: document.getElementById('viatDescricaoMan').value.trim(),
        };
      }

      try {
        const res = await fetch(`${API_BASE_URL}/api/viatura`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.status === 401) { logout(); return; }
        if (!res.ok) { const e = await res.json(); mostrarMsgViat(e.error || 'Erro ao salvar.', 'danger'); return; }
        mostrarMsgViat('Registro salvo com sucesso!', 'success');
        limparFormViatura();
        carregarViatura();
      } catch { mostrarMsgViat('Erro de conexão.', 'danger'); }
    }

    async function carregarViatura() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/viatura`, { credentials: 'include' });
        if (res.ok) todosRegistros = await res.json();
      } catch {}
    }

    function renderizarViatura(lista) {
      const el = document.getElementById('listaViatura');
      if (!lista.length) { el.innerHTML = '<p style="text-align:center;color:var(--color-hint);">Nenhum registro encontrado.</p>'; return; }
      const tipoLabel = { abastecimento: 'Abastecimento', revisao: 'Revisão', manutencao: 'Manutenção' };
      el.innerHTML = `<table>
        <thead><tr><th>Data/Hora</th><th>Viatura</th><th>Tipo</th><th>KM</th><th>Responsável</th><th>Detalhe</th></tr></thead>
        <tbody>${lista.map(r => {
          const dados = typeof r.dados === 'string' ? JSON.parse(r.dados) : (r.dados || {});
          let detalhe = '';
          if (r.tipo === 'abastecimento') detalhe = dados.litros ? `${dados.litros}L ${dados.combustivel || ''}` : '—';
          else if (r.tipo === 'revisao')   detalhe = dados.tipoRevisao || '—';
          else                             detalhe = dados.problema || '—';
          return `<tr>
            <td>${new Date(r.data_hora).toLocaleString('pt-BR')}</td>
            <td>${r.codigo}</td>
            <td><span class="badge badge-agente">${tipoLabel[r.tipo] || r.tipo}</span></td>
            <td>${Number(r.km).toLocaleString('pt-BR')} km</td>
            <td>${r.responsavel}</td>
            <td style="font-size:0.8rem;color:var(--color-text-muted);">${detalhe}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
    }

    function filtrarViatura() {
      const cod  = document.getElementById('buscarViat').value.toLowerCase();
      const tipo = document.getElementById('filtroTipoViat').value;
      renderizarViatura(todosRegistros.filter(r =>
        (!cod  || r.codigo.toLowerCase().includes(cod)) &&
        (!tipo || r.tipo === tipo)
      ));
    }

    function limparFiltroViat() {
      document.getElementById('buscarViat').value = '';
      document.getElementById('filtroTipoViat').value = '';
      renderizarViatura(todosRegistros);
    }

    function limparFormViatura() {
      ['viatCodigo','viatKm','viatLitros','viatValorLitro','viatPosto',
       'viatOficinaRev','viatProximaRev','viatValorRev','viatItensRev',
       'viatProblema','viatOficinaMan','viatPecas','viatValorMan','viatDescricaoMan','viatObs']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      document.getElementById('viatDataHora').value = new Date().toISOString().slice(0, 16);
    }

    function mostrarMsgViat(texto, tipo) {
      const el = document.getElementById('msgViatura');
      el.textContent = texto;
      el.style.display = 'block';
      el.style.background = tipo === 'success' ? '#dcfce7' : '#fee2e2';
      el.style.color      = tipo === 'success' ? '#166534' : '#991b1b';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }
  </script>
</body>
</html>
