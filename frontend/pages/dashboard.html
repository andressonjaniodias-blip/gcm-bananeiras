<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema de BO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme-switcher.js"></script>
  <style>
    .obrigatorio::after { content: ' *'; color: #c0392b; }
    input:invalid, textarea:invalid { border-color: #e74c3c !important; }
    .campo-group { display: flex; flex-direction: column; gap: 4px; }
    .campo-group label { font-size: 0.85rem; font-weight: bold; color: #333; }
    .hint { font-size: 0.75rem; color: #888; }
  </style>
</head>
<body>
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <h1>Sistema de Registro de BO</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="usuarioLogado" style="font-size:0.85rem;color:#cce;"></span>
      <a id="linkUsuarios" href="/pages/usuarios.html" style="display:none;color:#fff;font-size:0.85rem;text-decoration:underline;">Usuários</a>
      <a href="/pages/consulta.html" style="color:#fff;font-size:0.85rem;text-decoration:underline;">Histórico</a>
      <button onclick="logout()" style="background:#c0392b;color:#fff;border:none;border-radius:4px;padding:6px 12px;cursor:pointer;font-size:0.85rem;">Sair</button>
    </div>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <main class="dashboard">
    <h2>BO Nº: <span id="numeroBO">BO-GCM-????</span></h2>

    <nav class="tabs">
      <button onclick="showTab('solicitacao')" class="tab-btn active">Dados da Solicitação</button>
      <button onclick="showTab('ocorrencia')" class="tab-btn">Dados da Ocorrência</button>
      <button onclick="showTab('vitima')" class="tab-btn">Vítimas</button>
      <button onclick="showTab('suspeito')" class="tab-btn">Suspeitos</button>
      <button onclick="showTab('relato')" class="tab-btn">Relato</button>
      <button onclick="showTab('objetos')" class="tab-btn">Objetos</button>
      <button onclick="showTab('autoridade')" class="tab-btn">Autoridade</button>
    </nav>

    <!-- Solicitação -->
    <section id="solicitacao" class="tab-content">
      <h3>Dados da Solicitação</h3>
      <div class="campo-group">
        <label class="obrigatorio">Canal da Solicitação</label>
        <input type="text" name="canal" placeholder="Ex: Rádio, Telefone, Presencial" required maxlength="100">
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Data e Hora da Solicitação</label>
        <input type="datetime-local" name="dataHoraSolicitacao" required>
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Natureza da Solicitação</label>
        <input type="text" name="natureza" placeholder="Ex: Perturbação de sossego, Furto" required maxlength="150">
      </div>
      <div class="campo-group">
        <label>Nome do Solicitante</label>
        <input type="text" name="nomeSolicitante" placeholder="Nome completo" maxlength="150">
      </div>
      <div class="campo-group">
        <label>RG / CPF / CNH</label>
        <input type="text" name="documentoSolicitante" placeholder="000.000.000-00" maxlength="20" oninput="mascararCPF(this)">
      </div>
      <div class="campo-group">
        <label>Telefone</label>
        <input type="tel" name="telefoneSolicitante" placeholder="(00) 00000-0000" maxlength="15" oninput="mascararTelefone(this)">
      </div>
    </section>

    <!-- Ocorrência -->
    <section id="ocorrencia" class="tab-content hidden">
      <h3>Dados da Ocorrência</h3>
      <div class="campo-group">
        <label class="obrigatorio">Tipificação</label>
        <input type="text" name="tipificacao" placeholder="Ex: Lesão Corporal, Furto, Perturbação" required maxlength="150">
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Data e Hora da Ocorrência</label>
        <input type="datetime-local" name="dataHoraOcorrencia" required>
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Rua / Logradouro</label>
        <input type="text" name="rua" placeholder="Nome da rua" required maxlength="200">
      </div>
      <div class="campo-group">
        <label>Número</label>
        <input type="text" name="numero" placeholder="Nº ou S/N" maxlength="20">
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Cidade</label>
        <input type="text" name="cidade" placeholder="Cidade" required maxlength="100">
      </div>
      <div class="campo-group">
        <label>Complemento / Bairro</label>
        <input type="text" name="complemento" placeholder="Bairro, ponto de referência" maxlength="200">
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Código da Viatura</label>
        <input type="text" name="viatura" placeholder="Ex: GCM-01" required maxlength="20">
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Comandante</label>
        <input type="text" name="comandante" placeholder="Nome do comandante" required maxlength="150">
      </div>
      <div class="campo-group">
        <label>Motorista</label>
        <input type="text" name="motorista" placeholder="Nome do motorista" maxlength="150">
      </div>
      <div class="campo-group">
        <label>Patrulheiro I</label>
        <input type="text" name="patrulheiroI" placeholder="Nome" maxlength="150">
      </div>
      <div class="campo-group">
        <label>Patrulheiro II</label>
        <input type="text" name="patrulheiroII" placeholder="Nome" maxlength="150">
      </div>
    </section>

    <!-- Vítimas -->
    <section id="vitima" class="tab-content hidden">
      <h3>Dados das Vítimas</h3>
      <div id="vitimas-list"></div>
      <button type="button" class="btn-adicionar" onclick="adicionarVitima()">+ Adicionar Vítima</button>
    </section>

    <!-- Suspeitos -->
    <section id="suspeito" class="tab-content hidden">
      <h3>Dados dos Suspeitos</h3>
      <div id="suspeitos-list"></div>
      <button type="button" class="btn-adicionar" onclick="adicionarSuspeito()">+ Adicionar Suspeito</button>
    </section>

    <!-- Relato -->
    <section id="relato" class="tab-content hidden">
      <h3>Relato da Ocorrência</h3>
      <div class="campo-group">
        <label class="obrigatorio">Descrição dos fatos</label>
        <textarea id="relatoTexto" name="relato" rows="12" placeholder="Descreva detalhadamente os fatos ocorridos..." required minlength="20"></textarea>
        <span class="hint">Mínimo de 20 caracteres.</span>
      </div>
    </section>

    <!-- Objetos -->
    <section id="objetos" class="tab-content hidden">
      <h3>Objetos Apreendidos</h3>
      <div id="objetos-list"></div>
      <button type="button" class="btn-adicionar" onclick="adicionarObjeto()">+ Adicionar Objeto</button>
    </section>

    <!-- Autoridade -->
    <section id="autoridade" class="tab-content hidden">
      <h3>Autoridade Policial</h3>
      <div class="campo-group">
        <label class="obrigatorio">Data e Hora do Recebimento</label>
        <input type="datetime-local" name="dataHoraAutoridade" required>
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Nome da Autoridade</label>
        <input type="text" name="nomeAutoridade" placeholder="Nome completo" required maxlength="150">
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Cargo</label>
        <input type="text" name="cargo" placeholder="Ex: Delegado, Inspetor" required maxlength="100">
      </div>
      <div class="campo-group">
        <label class="obrigatorio">Matrícula</label>
        <input type="text" name="matricula" placeholder="Número da matrícula" required maxlength="30">
      </div>
      <div class="campo-group">
        <label>Local</label>
        <input type="text" name="localAutoridade" placeholder="Delegacia / Unidade" maxlength="150">
      </div>
    </section>

    <div class="actions">
      <button onclick="salvarBO()">Salvar Rascunho</button>
      <button onclick="finalizarBO()" style="background:#1a7a1a;">Finalizar BO</button>
    </div>

    <p style="font-size:0.8rem;color:#888;text-align:center;margin-top:8px;">* Campos obrigatórios</p>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
