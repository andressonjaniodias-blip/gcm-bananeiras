<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de BOs - GCM Bananeiras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme-switcher.js"></script>
  <script src="../assets/js/sidebar.js"></script>
</head>
<body>
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <div class="header-titulo">
      <span class="header-linha-1">GUARDA CIVIL MUNICIPAL</span>
      <span class="header-linha-2">SISTEMA ONLINE</span>
      <span class="header-linha-3">PREFEITURA MUNICIPAL DE BANANEIRAS</span>
    </div>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <div class="consulta">
    <h2>Boletins de Ocorrência</h2>

    <div class="filters">
      <label>Buscar:</label>
      <input type="text" id="buscar" placeholder="Número do BO (ex: BO-GCM-0001)">
      <label>Data:</label>
      <input type="date" id="data">
      <button onclick="filtrar()">Filtrar</button>
      <button class="btn-limpar" onclick="limparFiltro()">Limpar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nº do BO</th>
          <th>Data</th>
          <th>Natureza</th>
          <th>Registrado por</th>
          <th>PDF</th>
        </tr>
      </thead>
      <tbody id="listaBOs">
        <tr><td colspan="5" style="text-align:center;color:var(--color-hint);">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    let todosOsBOs = [];

    (async () => {
      try {
        const res = await fetch(`${API_BASE_URL}/api/auth/me`, { credentials: 'include' });
        if (!res.ok) { window.location.href = '/'; return; }
        const perfil = await res.json();
        sessionStorage.setItem('perfil', JSON.stringify(perfil));
        if (typeof updateSidebarUser === 'function') updateSidebarUser(perfil);
      } catch { window.location.href = '/'; return; }
      carregarBOs();
    })();

    async function carregarBOs() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/bo`, { credentials: 'include' });
        if (res.status === 401) { logout(); return; }
        todosOsBOs = await res.json();
        renderizar(todosOsBOs);
      } catch {
        document.getElementById('listaBOs').innerHTML =
          '<tr><td colspan="5" style="text-align:center;color:var(--color-danger);">Erro ao carregar boletins.</td></tr>';
      }
    }

    function renderizar(bos) {
      const tbody = document.getElementById('listaBOs');
      if (!bos.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--color-hint);">Nenhum BO encontrado.</td></tr>';
        return;
      }
      tbody.innerHTML = bos.map(bo => {
        let natureza = '';
        try {
          const dados = JSON.parse(bo.dados);
          natureza = dados.dadosOcorrencia?.tipificacao || dados.dadosSolicitacao?.natureza || '—';
        } catch {}
        const data = new Date(bo.data).toLocaleDateString('pt-BR');
        return `<tr>
          <td>${bo.numero}</td>
          <td>${data}</td>
          <td>${natureza}</td>
          <td>${bo.criado_por || '—'}</td>
          <td><button class="btn-pdf" onclick="baixarPDF(${bo.id}, '${bo.numero}')">PDF</button></td>
        </tr>`;
      }).join('');
    }

    function filtrar() {
      const termo = document.getElementById('buscar').value.trim().toLowerCase();
      const data  = document.getElementById('data').value;
      renderizar(todosOsBOs.filter(bo => {
        const matchNumero = !termo || bo.numero.toLowerCase().includes(termo);
        const matchData   = !data  || bo.data.startsWith(data);
        return matchNumero && matchData;
      }));
    }

    function limparFiltro() {
      document.getElementById('buscar').value = '';
      document.getElementById('data').value   = '';
      renderizar(todosOsBOs);
    }

    async function baixarPDF(id, numero) {
      try {
        const res = await fetch(`${API_BASE_URL}/api/bo/${id}/pdf`, { credentials: 'include' });
        if (!res.ok) { alert('Erro ao gerar PDF.'); return; }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `bo_${numero}.pdf`;
        a.click();
        URL.revokeObjectURL(url);
      } catch { alert('Erro ao baixar PDF.'); }
    }
  </script>
</body>
</html>
