<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de BOs - Sistema de BO</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <h1>Sistema de Registro de BO</h1>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <main class="consulta">
    <h2>Consultar BOs</h2>

    <!-- Filtros -->
    <div class="filters">
      <label for="buscar">Buscar:</label>
      <input type="text" id="buscar" placeholder="Número do BO">
      
      <label for="data">Data:</label>
      <input type="date" id="data">
      
      <button onclick="filtrarBOs()">Filtrar</button>
    </div>

    <!-- Tabela de BOs -->
    <table>
      <thead>
        <tr>
          <th>Nº do BO</th>
          <th>Data</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaBOs">
        <!-- Linhas preenchidas dinamicamente pelo main.js -->
      </tbody>
    </table>
  </main>

  <script src="../assets/js/main.js"></script>
  <script>
    // Carregar BOs ao abrir a página
    document.addEventListener("DOMContentLoaded", listarBOs);
  </script>
</body>
</html>
