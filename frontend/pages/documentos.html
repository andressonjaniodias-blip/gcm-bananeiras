<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentos - GCM Bananeiras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme-switcher.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <style>
    .obrigatorio::after { content: ' *'; color: var(--color-danger); }
    .upload-area {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-sm);
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--color-bloco-bg);
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }
    .upload-area input[type="file"] { display: none; }
    .upload-nome { margin-top: 8px; font-size: 0.85rem; color: var(--color-primary); font-weight: 600; }
  </style>
</head>
<body>
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <div class="header-titulo">
      <span class="header-linha-1">PREFEITURA MUNICIPAL DE BANANEIRAS</span>
      <span class="header-linha-2">GUARDA CIVIL MUNICIPAL</span>
      <span class="header-linha-3">Secretaria de Administração Pública Municipal</span>
    </div>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <main class="dashboard">
    <nav class="tabs" id="docTabs">
      <button class="tab-btn" id="btnTabPublicar" onclick="showDocTab('publicar')">Publicar Documento</button>
      <button class="tab-btn active" id="btnTabAcervo" onclick="showDocTab('acervo')">Acervo</button>
    </nav>

    <!-- PUBLICAR -->
    <section id="publicar" class="tab-content hidden">
      <h3>Publicar Novo Documento</h3>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="campo-group">
          <label class="obrigatorio">Tipo de Documento</label>
          <select id="docTipo" required>
            <option value="">Selecione</option>
            <option>Ofício</option>
            <option>Escala de Serviço</option>
            <option>Memorando</option>
            <option>Portaria</option>
            <option>Circular</option>
            <option>Comunicado</option>
            <option>Ordem de Serviço</option>
            <option>Outro</option>
          </select>
        </div>
        <div class="campo-group">
          <label class="obrigatorio">Data do Documento</label>
          <input type="date" id="docData" required>
        </div>
      </div>

      <div class="campo-group">
        <label class="obrigatorio">Título</label>
        <input type="text" id="docTitulo" placeholder="Ex: Escala de serviço — Julho/2025" required maxlength="200">
      </div>

      <div class="campo-group">
        <label>Número / Referência</label>
        <input type="text" id="docNumero" placeholder="Ex: OF-2025-0042" maxlength="80">
      </div>

      <div class="campo-group">
        <label>Descrição</label>
        <textarea id="docDescricao" rows="3" placeholder="Breve descrição do conteúdo..." style="min-height:80px;"></textarea>
      </div>

      <div class="campo-group">
        <label class="obrigatorio">Arquivo</label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('docArquivo').click()"
             ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropArquivo(event)">
          <p style="color:var(--color-text-muted);font-size:0.9rem;">Clique ou arraste o arquivo aqui</p>
          <p style="color:var(--color-hint);font-size:0.78rem;margin-top:4px;">PDF, DOC, DOCX, JPG, PNG — máx. 10 MB</p>
          <input type="file" id="docArquivo" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" onchange="selecionarArquivo(this)">
        </div>
        <div class="upload-nome" id="docArquivoNome" style="display:none;"></div>
      </div>

      <div class="actions">
        <button onclick="publicarDocumento()" style="background:var(--color-success);">Publicar Documento</button>
      </div>
      <p id="msgDoc" class="msg" style="margin-top:12px;"></p>
    </section>

    <!-- ACERVO -->
    <section id="acervo" class="tab-content hidden">
      <h3>Acervo de Documentos</h3>
      <div class="filters" style="margin-bottom:16px;">
        <input type="text" id="buscarDoc" placeholder="Buscar por título ou número...">
        <select id="filtroTipoDoc" style="padding:8px 12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-input-bg);color:var(--color-text);">
          <option value="">Todos os tipos</option>
          <option>Ofício</option>
          <option>Escala de Serviço</option>
          <option>Memorando</option>
          <option>Portaria</option>
          <option>Circular</option>
          <option>Comunicado</option>
          <option>Ordem de Serviço</option>
          <option>Outro</option>
        </select>
        <button onclick="filtrarDocs()">Filtrar</button>
        <button class="btn-limpar" onclick="limparFiltroDoc()">Limpar</button>
      </div>
      <div id="listaDocumentos">
        <p style="text-align:center;color:var(--color-hint);">Carregando...</p>
      </div>
    </section>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    let todosDocumentos = [];
    let arquivoBase64 = null;
    let arquivoNome   = null;
    let arquivoMime   = null;

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('docData').value = new Date().toISOString().slice(0, 10);
      carregarDocumentos();

      const perfil = JSON.parse(sessionStorage.getItem('perfil') || '{}');
      const podePublicar = perfil.role === 'supervisor' || perfil.role === 'admin';
      const btnPublicar = document.getElementById('btnTabPublicar');
      if (!podePublicar) {
        btnPublicar.style.display = 'none';
        showDocTab('acervo');
      } else {
        btnPublicar.classList.add('active');
        document.getElementById('btnTabAcervo').classList.remove('active');
        showDocTab('publicar');
      }
    });

    function showDocTab(id) {
      document.querySelectorAll('#publicar, #acervo').forEach(s => s.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.remove('hidden');
      event?.target?.classList.add('active');
      if (id === 'acervo') renderizarDocs(todosDocumentos);
    }

    function selecionarArquivo(input) {
      if (!input.files.length) return;
      processarArquivo(input.files[0]);
    }

    function dragOver(e) {
      e.preventDefault();
      document.getElementById('uploadArea').classList.add('drag-over');
    }

    function dragLeave(e) {
      document.getElementById('uploadArea').classList.remove('drag-over');
    }

    function dropArquivo(e) {
      e.preventDefault();
      document.getElementById('uploadArea').classList.remove('drag-over');
      if (e.dataTransfer.files.length) processarArquivo(e.dataTransfer.files[0]);
    }

    function processarArquivo(file) {
      if (file.size > 10 * 1024 * 1024) {
        mostrarMsgDoc('Arquivo muito grande. Máximo: 10 MB.', 'danger'); return;
      }
      arquivoNome = file.name;
      arquivoMime = file.type;
      const reader = new FileReader();
      reader.onload = e => {
        arquivoBase64 = e.target.result.split(',')[1];
        const nomeEl = document.getElementById('docArquivoNome');
        nomeEl.textContent = file.name;
        nomeEl.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    async function publicarDocumento() {
      const tipo   = document.getElementById('docTipo').value;
      const titulo = document.getElementById('docTitulo').value.trim();
      const data   = document.getElementById('docData').value;

      if (!tipo || !titulo || !data) { mostrarMsgDoc('Preencha os campos obrigatórios.', 'danger'); return; }
      if (!arquivoBase64)            { mostrarMsgDoc('Selecione um arquivo.', 'danger'); return; }

      const payload = {
        tipo, titulo, data,
        numero:    document.getElementById('docNumero').value.trim(),
        descricao: document.getElementById('docDescricao').value.trim(),
        arquivo:   arquivoBase64,
        arquivoNome,
        arquivoMime,
      };

      try {
        const res = await fetch(`${API_BASE_URL}/api/documentos`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.status === 401) { logout(); return; }
        if (!res.ok) { const e = await res.json(); mostrarMsgDoc(e.error || 'Erro ao publicar.', 'danger'); return; }
        mostrarMsgDoc('Documento publicado com sucesso!', 'success');
        limparFormDoc();
        carregarDocumentos();
      } catch { mostrarMsgDoc('Erro de conexão.', 'danger'); }
    }

    async function carregarDocumentos() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/documentos`, { credentials: 'include' });
        if (res.ok) todosDocumentos = await res.json();
      } catch {}
    }

    function renderizarDocs(lista) {
      const el = document.getElementById('listaDocumentos');
      if (!lista.length) { el.innerHTML = '<p style="text-align:center;color:var(--color-hint);">Nenhum documento encontrado.</p>'; return; }
      el.innerHTML = '<div class="doc-list">' + lista.map(d => `
        <div class="doc-item">
          <div class="doc-item-info">
            <div class="doc-item-title">${d.titulo}</div>
            <div class="doc-item-meta">${d.numero ? d.numero + ' &bull; ' : ''}${new Date(d.data).toLocaleDateString('pt-BR')} &bull; Publicado por: ${d.publicado_por}</div>
            ${d.descricao ? `<div class="doc-item-meta" style="margin-top:2px;">${d.descricao}</div>` : ''}
          </div>
          <span class="doc-badge">${d.tipo}</span>
          <button class="btn-pdf" onclick="baixarDoc(${d.id}, '${d.arquivo_nome}')">Baixar</button>
        </div>`).join('') + '</div>';
    }

    function filtrarDocs() {
      const termo = document.getElementById('buscarDoc').value.toLowerCase();
      const tipo  = document.getElementById('filtroTipoDoc').value;
      renderizarDocs(todosDocumentos.filter(d =>
        (!termo || d.titulo.toLowerCase().includes(termo) || (d.numero || '').toLowerCase().includes(termo)) &&
        (!tipo  || d.tipo === tipo)
      ));
    }

    function limparFiltroDoc() {
      document.getElementById('buscarDoc').value = '';
      document.getElementById('filtroTipoDoc').value = '';
      renderizarDocs(todosDocumentos);
    }

    async function baixarDoc(id, nome) {
      try {
        const res = await fetch(`${API_BASE_URL}/api/documentos/${id}/download`, { credentials: 'include' });
        if (!res.ok) { alert('Erro ao baixar arquivo.'); return; }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = nome || `documento_${id}`;
        a.click();
        URL.revokeObjectURL(url);
      } catch { alert('Erro ao baixar arquivo.'); }
    }

    function limparFormDoc() {
      ['docTipo','docData','docTitulo','docNumero','docDescricao'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = id === 'docData' ? new Date().toISOString().slice(0, 10) : '';
      });
      arquivoBase64 = arquivoNome = arquivoMime = null;
      document.getElementById('docArquivoNome').style.display = 'none';
      document.getElementById('docArquivo').value = '';
    }

    function mostrarMsgDoc(texto, tipo) {
      const el = document.getElementById('msgDoc');
      el.textContent = texto;
      el.style.display = 'block';
      el.style.background = tipo === 'success' ? '#dcfce7' : '#fee2e2';
      el.style.color      = tipo === 'success' ? '#166534' : '#991b1b';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }
  </script>
</body>
</html>
