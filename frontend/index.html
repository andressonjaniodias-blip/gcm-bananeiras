<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Registro de BO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/theme-switcher.js"></script>
</head>
<body>
  <div id="app-shell">
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <div class="header-titulo">
      <span class="header-linha-1">PREFEITURA MUNICIPAL DE BANANEIRAS</span>
      <span class="header-linha-2">GUARDA CIVIL MUNICIPAL</span>
      <span class="header-linha-3">Secretaria de Administração Pública Municipal</span>
    </div>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <!-- Box fixa: enquanto não logado fica só com o fundo; após login mostra a ação central -->
  <main class="app-stage" id="appStage">
    <div class="app-stage-bg" id="appStageBg">
      <div class="app-stage-bg-layer"></div>
      <div class="app-stage-bg-layer"></div>
    </div>
    <div class="app-stage-overlay"></div>

    <!-- Botões flutuantes: menu e tema — canto superior esquerdo -->
    <div class="stage-float-btns">
      <div class="header-nav-wrapper" id="hdr-nav-wrapper">
        <button class="stage-fab stage-fab--menu" id="hdr-btn-menu" title="Menu" onclick="toggleNavMenu()">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 5h14M3 10h14M3 15h14"/></svg>
        </button>
        <div class="header-nav-menu" id="hdr-nav-menu"></div>
      </div>
      <div class="header-tema-wrapper" id="hdr-tema-wrapper">
        <button class="stage-fab stage-fab--tema" id="hdr-btn-tema" title="Tema" onclick="toggleTemaMenu()">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><circle cx="7.2" cy="8" r="1.1" fill="currentColor"/><circle cx="10" cy="6.2" r="1.1" fill="currentColor"/><circle cx="12.8" cy="8" r="1.1" fill="currentColor"/><circle cx="8" cy="12.5" r="1.1" fill="currentColor"/></svg>
        </button>
        <div class="header-tema-menu" id="hdr-tema-menu">
          <button class="sb-tema-item" data-theme="gov-modern" onclick="aplicarTema('gov-modern')"><span class="sb-tema-dot" style="background:#2171B5"></span>Gov Modern</button>
        </div>
      </div>
    </div>

    <button class="app-stage-btn" id="btnNovoBO" style="display:none" title="Criar Boletim de Ocorrência" aria-label="Criar Boletim de Ocorrência" onclick="openPageModal('/pages/dashboard.html','Novo Boletim de Ocorrência')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h5l5 5v9a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/><path d="M11 3v5h5"/><path d="M8 13h4M10 11v4"/></svg>
    </button>
  </main>
  </div>

  <!-- Modal flutuante único — usado para o login e para todos os formulários do menu -->
  <div class="pg-overlay" id="pg-overlay">
    <div class="pg-modal" id="pg-modal">
      <div class="pg-modal-head" id="pg-modal-head">
        <span class="pg-modal-title" id="pg-modal-title"></span>
        <button class="pg-modal-close" id="pg-modal-close" title="Fechar" onclick="closePageModal()">&times;</button>
      </div>
      <div class="pg-modal-body" id="pg-modal-body"></div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    const LOGIN_FORM_HTML = `
      <div style="padding:28px 30px;">
        <div id="avisoInatividade" style="display:none;background:#FEF3C7;border-left:4px solid #F59E0B;
          color:#92400E;padding:10px 14px;border-radius:6px;font-size:0.84rem;font-weight:600;margin-bottom:14px;">
          ⏱️ Sua sessão foi encerrada por inatividade. Faça login novamente.
        </div>
        <form onsubmit="login(); return false;">
          <div class="input-icon-group">
            <span class="input-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="7" r="3.5"/><path d="M3 18c0-3.87 3.13-7 7-7s7 3.13 7 7"/></svg></span>
            <input type="text" id="usuario" placeholder="Usuário" required>
          </div>
          <div class="input-icon-group">
            <span class="input-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="9" width="10" height="8" rx="1.5"/><path d="M7 9V6a3 3 0 016 0v3"/></svg></span>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="button" class="input-pass-toggle" id="btnTogglePass" title="Mostrar senha" onclick="togglePassVisibility()">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10s2.7-5 8-5 8 5 8 5-2.7 5-8 5-8-5-8-5z"/><circle cx="10" cy="10" r="2.2"/></svg>
            </button>
          </div>
          <button type="submit" class="btn-gerar-bo">ENTRAR</button>
        </form>
        <p style="font-size:0.82rem;color:#888;text-align:center;margin-top:8px;">
          <a href="#" onclick="openPageModal('/pages/recuperar-senha.html','Recuperar Senha',{narrow:true});return false;" style="color:#1d4ed8;">Esqueceu sua senha?</a>
        </p>
      </div>`;

    // ── Fundo dinâmico da box fixa — alterna fotos da guarda em crossfade ──
    const STAGE_IMAGES = [
      'assets/img/stage-1.jpg',
      'assets/img/stage-2.jpg',
      'assets/img/stage-3.jpg',
      'assets/img/stage-4.jpg',
      'assets/img/stage-5.jpg',
    ];
    (function initStageBg() {
      const layers = document.querySelectorAll('.app-stage-bg-layer');
      if (!layers.length) return;
      let activeLayer = 0;
      let imgIdx = 0;
      layers[0].style.backgroundImage = `url('${STAGE_IMAGES[0]}')`;
      layers[0].classList.add('active');
      setInterval(() => {
        imgIdx = (imgIdx + 1) % STAGE_IMAGES.length;
        const nextLayer = 1 - activeLayer;
        layers[nextLayer].style.backgroundImage = `url('${STAGE_IMAGES[imgIdx]}')`;
        layers[nextLayer].classList.add('active');
        layers[activeLayer].classList.remove('active');
        activeLayer = nextLayer;
      }, 6000);
    })();

    const MENU = [
      { href: '/pages/dashboard.html',  label: 'Novo BO',             roles: ['agente', 'supervisor', 'admin'] },
      { href: '/pages/consulta.html',   label: 'Histórico de BOs',    roles: ['agente', 'supervisor', 'admin'] },
      { href: '/pages/relatorio.html',  label: 'Relatório Interno',   roles: ['agente', 'supervisor', 'admin'] },
      { href: '/pages/viatura.html',    label: 'Controle de Viatura', roles: ['agente', 'supervisor', 'admin'] },
      { href: '/pages/documentos.html', label: 'Documentos',          roles: ['agente', 'supervisor', 'admin'] },
      { href: '/pages/perfil.html',     label: 'Meu Perfil',          roles: ['agente', 'supervisor', 'admin'] },
      { href: '/pages/logs.html',       label: 'Log de Auditoria',    roles: ['supervisor', 'admin'] },
      { href: '/pages/usuarios.html',   label: 'Usuários',            roles: ['admin'] },
    ];

    function openPageModal(href, title, opts) {
      closeNavMenu();
      const modal = document.getElementById('pg-modal');
      const body  = document.getElementById('pg-modal-body');
      document.getElementById('pg-modal-title').textContent = title || '';
      document.getElementById('pg-modal-head').classList.add('pg-modal-head--accent');
      modal.classList.toggle('pg-modal--wide', !(opts && opts.narrow));
      document.getElementById('pg-modal-close').style.display = '';
      body.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.className = 'pg-modal-frame';
      iframe.src = href;
      body.appendChild(iframe);
      document.getElementById('pg-overlay').classList.add('aberto');
    }

    function openLoginModal() {
      const modal = document.getElementById('pg-modal');
      modal.classList.remove('pg-modal--wide');
      document.getElementById('pg-modal-title').textContent = 'Acessar o Sistema';
      document.getElementById('pg-modal-head').classList.add('pg-modal-head--accent');
      document.getElementById('pg-modal-close').style.display = 'none';
      document.getElementById('pg-modal-body').innerHTML = LOGIN_FORM_HTML;
      document.getElementById('pg-overlay').classList.add('aberto');
      if (new URLSearchParams(window.location.search).get('motivo') === 'inatividade') {
        document.getElementById('avisoInatividade').style.display = 'block';
      }
    }

    const ICON_EYE = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10s2.7-5 8-5 8 5 8 5-2.7 5-8 5-8-5-8-5z"/><circle cx="10" cy="10" r="2.2"/></svg>`;
    const ICON_EYE_OFF = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10s2.7-5 8-5 8 5 8 5-2.7 5-8 5-8-5-8-5z"/><circle cx="10" cy="10" r="2.2"/><path d="M3 3l14 14"/></svg>`;

    function togglePassVisibility() {
      const input = document.getElementById('senha');
      const btn = document.getElementById('btnTogglePass');
      if (!input || !btn) return;
      const mostrando = input.type === 'text';
      input.type = mostrando ? 'password' : 'text';
      btn.innerHTML = mostrando ? ICON_EYE : ICON_EYE_OFF;
      btn.title = mostrando ? 'Mostrar senha' : 'Ocultar senha';
    }

    function closePageModal() {
      document.getElementById('pg-overlay').classList.remove('aberto');
      document.getElementById('pg-modal-body').innerHTML = '';
    }

    function toggleNavMenu() { document.getElementById('hdr-nav-menu').classList.toggle('open'); }
    function closeNavMenu()  { document.getElementById('hdr-nav-menu').classList.remove('open'); }
    function toggleTemaMenu() { document.getElementById('hdr-tema-menu').classList.toggle('open'); }

    function aplicarTema(tema) {
      document.documentElement.setAttribute('data-theme', tema);
      localStorage.setItem('gcm-tema', tema);
      document.querySelectorAll('.sb-tema-item').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === tema));
      document.getElementById('hdr-tema-menu').classList.remove('open');
    }

    function buildNavMenu(role) {
      const nav = document.getElementById('hdr-nav-menu');
      const itens = MENU.filter(i => i.roles.includes(role)).map(i =>
        `<a href="#" class="header-nav-item" onclick="openPageModal('${i.href}','${i.label}');return false;">${i.label}</a>`
      ).join('');
      nav.innerHTML = itens + `<a href="#" class="header-nav-item nav-item-sair" onclick="logout();return false;">Sair do Sistema</a>`;
    }

    // Hook chamado por login() (assets/js/main.js) após autenticação bem-sucedida
    window.aposLoginSucesso = function (perfil) {
      closePageModal();
      document.getElementById('btnNovoBO').style.display = '';
      buildNavMenu(perfil.role || 'agente');
    };

    document.addEventListener('click', e => {
      const navWrap = document.getElementById('hdr-nav-wrapper');
      if (navWrap && !navWrap.contains(e.target)) closeNavMenu();
      const temaWrap = document.getElementById('hdr-tema-wrapper');
      if (temaWrap && !temaWrap.contains(e.target)) document.getElementById('hdr-tema-menu').classList.remove('open');
    });

    (async function start() {
      const temaAtual = localStorage.getItem('gcm-tema') || 'gov-modern';
      document.documentElement.setAttribute('data-theme', temaAtual);
      document.querySelectorAll('.sb-tema-item').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === temaAtual));

      try {
        const res = await fetch(`${API_BASE_URL}/api/auth/me`, { credentials: 'include' });
        if (res.ok) {
          const perfil = await res.json();
          sessionStorage.setItem('perfil', JSON.stringify(perfil));
          document.getElementById('btnNovoBO').style.display = '';
          buildNavMenu(perfil.role || 'agente');
          return;
        }
      } catch {}
      buildNavMenu('');
      openLoginModal();
    })();
  </script>
</body>
</html>
