<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sistema de Registro de BO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=3">
  <style>
    /* ── Quadro de Avisos: ancorado no canto inferior esquerdo do #app-shell,
       ocupando 1/4 da área, atrás do menu lateral (z-index: 300) ──────────── */
    .avisos-floating {
      position: absolute;
      left: 24px;
      bottom: 24px;
      height: calc(50% - 24px);
      aspect-ratio: 1 / 1;
      z-index: 1;
    }
    /* Mobile: o quadrado 1:1 baseado em 50% da altura fica mais largo que a
       tela em telas estreitas (ex.: iPhone SE) e é cortado pelo overflow:clip
       do #app-shell. Em telas pequenas, abandona o aspect-ratio fixo e usa
       largura quase total com altura proporcional à viewport — fica mais
       achatado, mas nunca estoura ou corta. */
    @media (max-width: 768px) {
      .avisos-floating {
        left: 12px;
        bottom: 12px;
        width: calc(100% - 24px);
        aspect-ratio: auto;
        height: clamp(160px, 32vh, 260px);
      }
    }
    @media (max-width: 480px) {
      .avisos-floating {
        left: 8px;
        bottom: 8px;
        width: calc(100% - 16px);
        height: clamp(140px, 28vh, 220px);
      }
    }
    .pub-panel {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--color-bloco-border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .pub-panel-header {
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--bg-header-from) 0%, var(--bg-header-to) 100%);
      border-bottom: 3px solid var(--color-accent);
      color: var(--header-text);
      display: flex; align-items: center; gap: 10px;
    }
    .pub-panel-header svg { width: 18px; height: 18px; stroke: var(--header-text); flex-shrink: 0; }
    .pub-panel-header-sub   { font-size: 1.05rem; font-weight: 700; }
    .pub-list { padding: 0; }

    .pub-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
      transition: background 0.15s;
      cursor: pointer;
    }
    .pub-item:last-child { border-bottom: none; }
    .pub-item:hover { background: var(--color-row-alt); }

    .pub-icon {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pub-icon svg { width: 18px; height: 18px; }
    .pub-icon.icon-pdf      { background: var(--color-danger-bg); }
    .pub-icon.icon-pdf svg  { stroke: var(--color-danger); }
    .pub-icon.icon-doc      { background: var(--color-info-bg); }
    .pub-icon.icon-doc svg  { stroke: var(--color-primary); }
    .pub-icon.icon-img      { background: var(--color-success-bg); }
    .pub-icon.icon-img svg  { stroke: var(--color-success); }
    .pub-icon.icon-default  { background: var(--color-primary-light); }
    .pub-icon.icon-default svg { stroke: var(--color-primary); }

    .pub-titulo {
      flex: 1; min-width: 0;
      font-size: 0.85rem; font-weight: 700; color: var(--color-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .pub-vazio {
      padding: 28px 16px; text-align: center;
      color: var(--color-hint); font-size: 0.85rem;
    }
    .pub-rodape {
      padding: 10px 16px; text-align: center;
      border-top: 1px solid var(--color-border);
    }
    .pub-rodape a {
      font-size: 0.8rem; color: var(--color-primary); font-weight: 600;
      text-decoration: none; cursor: pointer;
    }
    .pub-rodape a:hover { text-decoration: underline; }

    .ac-viewport { overflow: hidden; flex: 1; min-height: 0; touch-action: pan-y; }
    .ac-track { display: flex; height: 100%; transition: transform 0.45s ease; }
    .ac-track.ac-dragging { transition: none; }
    .ac-slide { flex: 0 0 100%; min-width: 100%; height: 100%; overflow-y: auto; }
    .ac-dots { display: flex; justify-content: center; gap: 6px; padding: 10px 0; border-top: 1px solid var(--color-border); }
    .ac-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--color-border); border: none; cursor: pointer; padding: 0;
      transition: width 0.2s, background 0.2s;
    }
    .ac-dot.active { background: var(--color-primary); width: 18px; border-radius: 4px; }
    .ac-resumo { padding: 14px 16px; }
    .ac-resumo-titulo { font-weight: 700; font-size: 0.85rem; color: var(--color-text); margin-bottom: 10px; }
    .ac-resumo-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  </style>
</head>
<body class="has-sidebar stage-page">
  <div id="app-shell">
    <header class="header">
      <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
      <div class="header-titulo">
        <span class="header-linha-1">PREFEITURA MUNICIPAL DE BANANEIRAS</span>
        <span class="header-linha-2">GUARDA CIVIL MUNICIPAL</span>
        <span class="header-linha-3">Secretaria de Administração Pública Municipal</span>
      </div>
      <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
    </header>

    <div id="shell-body">
      <aside id="sidebar">
        <div class="sb-user" id="sbUserBlock" style="display:none;">
          <a class="sb-avatar" id="sbAvatar" href="/pages/perfil.html" title="Alterar foto de perfil" onclick="openPageModal('/pages/perfil.html','Meu Perfil');return false;">?</a>
          <div class="sb-user-info">
            <span class="sb-user-name" id="sbNome">—</span>
            <span class="sb-user-role" id="sbRole">—</span>
          </div>
        </div>
        <nav class="sb-nav" id="sbNav"></nav>
        <div class="sb-footer" id="sbFooter" style="display:none;">
          <button class="sb-btn-sair" onclick="logout()">Sair do Sistema</button>
        </div>
      </aside>

      <div id="app-content">
        <!-- Box fixa: enquanto não logado fica só com o fundo; após login mostra a ação central -->
        <main class="app-stage" id="appStage">
          <div class="app-stage-bg" id="appStageBg">
            <div class="app-stage-bg-layer"></div>
            <div class="app-stage-bg-layer"></div>
          </div>
          <div class="app-stage-overlay"></div>

          <!-- Botões de menu e tema — canto superior esquerdo, sobre o palco -->
          <div class="stage-float-btns">
            <button class="header-icon-btn" id="hdr-btn-menu" title="Menu" onclick="toggleSidebar()">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 5h14M3 10h14M3 15h14"/></svg>
            </button>
          </div>

          <button class="app-stage-btn" id="btnNovoBO" style="display:none" title="Criar Boletim de Ocorrência" aria-label="Criar Boletim de Ocorrência" onclick="openPageModal('/pages/dashboard.html','Novo Boletim de Ocorrência')">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h5l5 5v9a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/><path d="M11 3v5h5"/><path d="M8 13h4M10 11v4"/></svg>
          </button>
        </main>
      </div>
    </div>

    <!-- Quadro de Avisos — só aparece após login (ver aposLoginSucesso) -->
    <div class="pub-panel avisos-floating" id="avisosCarousel" style="display:none"
         onmouseenter="acPause()" onmouseleave="acResume()">
      <div class="pub-panel-header">
        <svg viewBox="0 0 20 20" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h14M3 10h14M3 15h8"/></svg>
        <div class="pub-panel-header-sub" id="acHeaderSub">Publicações Oficiais</div>
      </div>
      <div class="ac-viewport" id="acViewport">
        <div class="ac-track" id="acTrack">
          <!-- Slide 1: Publicações -->
          <div class="ac-slide">
            <div class="pub-list" id="pubList">
              <div class="pub-vazio">Carregando...</div>
            </div>
            <div class="pub-rodape">
              <a href="/pages/documentos.html" onclick="openPageModal('/pages/documentos.html','Documentos');return false;">Ver todos os documentos →</a>
            </div>
          </div>
          <!-- Slide 2: Extras de hoje -->
          <div class="ac-slide">
            <div class="ac-resumo" id="extrasResumo">
              <div class="pub-vazio">Carregando...</div>
            </div>
            <div class="pub-rodape">
              <a href="/pages/extras.html" onclick="openPageModal('/pages/extras.html','Plantões Extras');return false;">Ver detalhes →</a>
            </div>
          </div>
          <!-- Slide 3: Escala de hoje -->
          <div class="ac-slide">
            <div class="ac-resumo" id="escalaResumo">
              <div class="pub-vazio">Carregando...</div>
            </div>
            <div class="pub-rodape">
              <a href="/pages/escala.html?ver=hoje" onclick="openPageModal('/pages/escala.html?ver=hoje','Escala de Serviço');return false;">Ver escala completa →</a>
            </div>
          </div>
        </div>
      </div>
      <div class="ac-dots" id="acDots">
        <button class="ac-dot active" onclick="acGoTo(0)" title="Publicações"></button>
        <button class="ac-dot" onclick="acGoTo(1)" title="Extras de hoje"></button>
        <button class="ac-dot" onclick="acGoTo(2)" title="Escala de hoje"></button>
      </div>
    </div>
  </div>

  <div id="sb-overlay" onclick="closeSidebar()"></div>

  <!-- Modal flutuante único — usado para o login e para todos os formulários do menu -->
  <div class="pg-overlay" id="pg-overlay">
    <div class="pg-modal" id="pg-modal">
      <div class="pg-modal-head" id="pg-modal-head">
        <span class="pg-modal-title" id="pg-modal-title"></span>
        <button class="pg-modal-close" id="pg-modal-close" title="Fechar" onclick="closePageModal()">&times;</button>
      </div>
      <div class="pg-modal-body" id="pg-modal-body"></div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    const LOGIN_FORM_HTML = `
      <div style="padding:28px 30px;">
        <div id="avisoInatividade" style="display:none;background:var(--color-warning-bg);border-left:4px solid var(--color-warning);
          color:var(--color-warning-text);padding:10px 14px;border-radius:var(--radius-sm);font-size:0.84rem;font-weight:600;margin-bottom:14px;">
          ⏱️ Sua sessão foi encerrada por inatividade. Faça login novamente.
        </div>
        <div id="avisoSessaoSubstituida" style="display:none;background:var(--color-danger-bg);border-left:4px solid var(--color-danger);
          color:var(--color-danger-text);padding:10px 14px;border-radius:var(--radius-sm);font-size:0.84rem;font-weight:600;margin-bottom:14px;">
          🔒 Sua sessão foi encerrada porque a conta foi acessada em outro dispositivo.
        </div>
        <form onsubmit="login(); return false;">
          <div class="input-icon-group">
            <span class="input-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="7" r="3.5"/><path d="M3 18c0-3.87 3.13-7 7-7s7 3.13 7 7"/></svg></span>
            <input type="text" id="usuario" placeholder="Usuário" required>
          </div>
          <div class="input-icon-group">
            <span class="input-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="9" width="10" height="8" rx="1.5"/><path d="M7 9V6a3 3 0 016 0v3"/></svg></span>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="button" class="input-pass-toggle" id="btnTogglePass" title="Mostrar senha" onclick="togglePassVisibility()">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10s2.7-5 8-5 8 5 8 5-2.7 5-8 5-8-5-8-5z"/><circle cx="10" cy="10" r="2.2"/></svg>
            </button>
          </div>
          <button type="submit" class="btn-gerar-bo">ENTRAR</button>
        </form>
        <p style="font-size:0.82rem;color:var(--color-text-muted);text-align:center;margin-top:8px;">
          <a href="#" onclick="openPageModal('/pages/recuperar-senha.html','Recuperar Senha',{narrow:true});return false;" style="color:var(--color-link);">Esqueceu sua senha?</a>
        </p>
      </div>`;

    // ── Fundo dinâmico da box fixa — alterna fotos da guarda em crossfade ──
    const STAGE_IMAGES = [
      'assets/img/stage-1.jpg',
      'assets/img/stage-2.jpg',
      'assets/img/stage-3.jpg',
      'assets/img/stage-4.jpg',
      'assets/img/stage-5.jpg',
    ];
    (function initStageBg() {
      const layers = document.querySelectorAll('.app-stage-bg-layer');
      if (!layers.length) return;
      let activeLayer = 0;
      let imgIdx = 0;
      layers[0].style.backgroundImage = `url('${STAGE_IMAGES[0]}')`;
      layers[0].classList.add('active');
      setInterval(() => {
        imgIdx = (imgIdx + 1) % STAGE_IMAGES.length;
        const nextLayer = 1 - activeLayer;
        layers[nextLayer].style.backgroundImage = `url('${STAGE_IMAGES[imgIdx]}')`;
        layers[nextLayer].classList.add('active');
        layers[activeLayer].classList.remove('active');
        activeLayer = nextLayer;
      }, 6000);
    })();

    // Menu principal, agrupado por seção. Cada grupo só aparece se tiver
    // itens visíveis para o perfil — abre as páginas na sidebar deslizante,
    // que reaproveita o mesmo visual usado nas páginas internas.
    const MENU = [
      { group: 'Operacional', items: [
        { href: '/pages/dashboard.html', label: 'Novo BO',             roles: ['agente', 'supervisor', 'admin'] },
        { href: '/pages/consulta.html',  label: 'Histórico de BOs',    roles: ['agente', 'supervisor', 'admin'] },
        { href: '/pages/relatorio.html', label: 'Relatório Interno',   roles: ['agente', 'supervisor', 'admin'] },
        { href: '/pages/viatura.html',   label: 'Controle de Viatura', roles: ['agente', 'supervisor', 'admin'] },
      ] },
      { group: 'Escalas & Plantões', items: [
        { href: '/pages/extras.html',    label: 'Plantões Extras',     roles: ['agente', 'supervisor', 'admin'] },
        { href: '/pages/escala.html',    label: 'Escala de Serviço',   roles: ['supervisor', 'admin'] },
      ] },
      { group: 'Administração', items: [
        { href: '/pages/documentos.html',label: 'Documentos',          roles: ['agente', 'supervisor', 'admin'] },
        { href: '/pages/perfil.html',    label: 'Meu Perfil',          roles: ['agente', 'supervisor', 'admin'] },
        { href: '/pages/logs.html',      label: 'Log de Auditoria',    roles: ['supervisor', 'admin'] },
        { href: '/pages/usuarios.html',  label: 'Usuários',            roles: ['admin'] },
      ] },
    ];

    const NAV_ICONS = {
      '/pages/dashboard.html':  `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h5l5 5v9a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/><path d="M11 3v5h5"/><path d="M8 13h4M10 11v4"/></svg>`,
      '/pages/consulta.html':   `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l2.5 2.5"/></svg>`,
      '/pages/relatorio.html':  `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="14" height="14" rx="1.5"/><path d="M7 13v-3M10 13V7M13 13v-5"/></svg>`,
      '/pages/viatura.html':    `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="16" height="7" rx="1.5"/><path d="M4 8l2-4h8l2 4"/><circle cx="6" cy="15" r="1.5"/><circle cx="14" cy="15" r="1.5"/></svg>`,
      '/pages/extras.html':     `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="11" r="6"/><path d="M10 11V8"/><path d="M8 2.5h4"/><path d="M10 2.5v2"/></svg>`,
      '/pages/escala.html':     `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="13" rx="1.5"/><path d="M3 8h14M8 8v9M13 8v9M3 12.5h14"/><path d="M7 2v3M13 2v3"/></svg>`,
      '/pages/documentos.html': `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h7l4 4v11a1 1 0 01-1 1H5a1 1 0 01-1-1V4a1 1 0 011-1z"/><path d="M12 3v5h5"/><path d="M7 10h6M7 13h4"/></svg>`,
      '/pages/perfil.html':     `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="7" r="3.5"/><path d="M3 18c0-3.87 3.13-7 7-7s7 3.13 7 7"/></svg>`,
      '/pages/logs.html':       `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="12" height="14" rx="1.5"/><path d="M7 7h6M7 10h6M7 13h4"/></svg>`,
      '/pages/usuarios.html':   `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="7" r="3"/><path d="M1 18c0-3.31 2.91-6 6.5-6"/><circle cx="14" cy="8" r="2.5"/><path d="M19 18c0-2.76-2.24-5-5-5"/></svg>`,
    };
    function openPageModal(href, title, opts) {
      closeSidebar();
      const modal = document.getElementById('pg-modal');
      const body  = document.getElementById('pg-modal-body');
      document.getElementById('pg-modal-title').textContent = title || '';
      document.getElementById('pg-modal-head').classList.add('pg-modal-head--accent');
      modal.classList.toggle('pg-modal--wide', !(opts && opts.narrow));
      document.getElementById('pg-modal-close').style.display = '';
      body.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.className = 'pg-modal-frame';
      iframe.src = href;
      body.appendChild(iframe);
      document.getElementById('pg-overlay').classList.add('aberto');
      document.querySelectorAll('.sb-link').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === href);
      });
    }

    function openLoginModal() {
      const modal = document.getElementById('pg-modal');
      modal.classList.remove('pg-modal--wide');
      modal.classList.add('pg-modal--narrow');
      document.getElementById('pg-modal-title').textContent = 'Acessar o Sistema';
      document.getElementById('pg-modal-head').classList.add('pg-modal-head--accent');
      document.getElementById('pg-modal-close').style.display = 'none';
      document.getElementById('pg-modal-body').innerHTML = LOGIN_FORM_HTML;
      document.getElementById('pg-overlay').classList.add('aberto');
      if (new URLSearchParams(window.location.search).get('motivo') === 'inatividade') {
        document.getElementById('avisoInatividade').style.display = 'block';
      }
      const avisoLogin = sessionStorage.getItem('gcm_aviso_login');
      if (avisoLogin) {
        const el = document.getElementById('avisoSessaoSubstituida');
        if (el) { el.style.display = 'block'; el.textContent = '🔒 ' + avisoLogin; }
        sessionStorage.removeItem('gcm_aviso_login');
      }
    }

    function closePageModal() {
      document.getElementById('pg-overlay').classList.remove('aberto');
      document.getElementById('pg-modal-body').innerHTML = '';
    }

    const ICON_EYE = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10s2.7-5 8-5 8 5 8 5-2.7 5-8 5-8-5-8-5z"/><circle cx="10" cy="10" r="2.2"/></svg>`;
    const ICON_EYE_OFF = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10s2.7-5 8-5 8 5 8 5-2.7 5-8 5-8-5-8-5z"/><circle cx="10" cy="10" r="2.2"/><path d="M3 3l14 14"/></svg>`;

    function togglePassVisibility() {
      const input = document.getElementById('senha');
      const btn = document.getElementById('btnTogglePass');
      if (!input || !btn) return;
      const mostrando = input.type === 'text';
      input.type = mostrando ? 'password' : 'text';
      btn.innerHTML = mostrando ? ICON_EYE : ICON_EYE_OFF;
      btn.title = mostrando ? 'Mostrar senha' : 'Ocultar senha';
    }

    // ── Sidebar deslizante (mesmo componente visual das páginas internas) ──
    // No palco, a sidebar é sempre um overlay (não empurra o conteúdo,
    // não redimensiona a foto) — mesmo comportamento em qualquer tela.
    function toggleSidebar() {
      const open = document.body.classList.toggle('sb-open');
      document.getElementById('sb-overlay').style.display = open ? 'block' : 'none';
    }

    function closeSidebar() {
      document.body.classList.remove('sb-open');
      document.getElementById('sb-overlay').style.display = 'none';
    }

    function buildSidebarNav(role) {
      const nav = document.getElementById('sbNav');
      let html = '';
      MENU.forEach(secao => {
        const itens = secao.items.filter(i => i.roles.includes(role));
        itens.forEach(i => {
          html += `<a href="${i.href}" class="sb-link" onclick="openPageModal('${i.href}','${i.label}');return false;">
            <span class="sb-icon">${NAV_ICONS[i.href] || ''}</span><span>${i.label}</span>
          </a>`;
        });
      });
      nav.innerHTML = html;

      const logado = !!role;
      document.getElementById('sbFooter').style.display = logado ? '' : 'none';
      document.getElementById('sbUserBlock').style.display = logado ? '' : 'none';
    }

    // Hook chamado por login() (assets/js/main.js) após autenticação bem-sucedida
    window.aposLoginSucesso = function (perfil) {
      closePageModal();
      document.getElementById('btnNovoBO').style.display = '';
      const role = perfil.role || 'agente';
      const roleLabel = { admin: 'Administrador', supervisor: 'Supervisor', agente: 'Agente GCM' }[role] || 'Agente GCM';
      document.getElementById('sbNome').textContent = perfil.usuario || '—';
      document.getElementById('sbRole').textContent = roleLabel;
      const sbAvatar = document.getElementById('sbAvatar');
      sbAvatar.innerHTML = perfil.foto
        ? `<img src="${perfil.foto}" alt="Foto de perfil">`
        : (perfil.usuario || '?')[0].toUpperCase();
      buildSidebarNav(role);

      document.getElementById('avisosCarousel').style.display = '';
      carregarQuadroDeAvisos();
    };

    // ── Quadro de Avisos (carrossel) — só é chamado após login bem-sucedido ──
    const AC_SUBS = ['Publicações Oficiais', 'Plantões extras de hoje', 'Escala de serviço de hoje'];
    let acIndex = 0, acTimer = null;
    const acSlideCount = () => document.querySelectorAll('#acTrack .ac-slide').length;

    function acGoTo(i) {
      const total = acSlideCount();
      acIndex = Math.max(0, Math.min(total - 1, i));
      document.getElementById('acTrack').style.transform = `translateX(-${acIndex * 100}%)`;
      document.querySelectorAll('#acDots .ac-dot').forEach((d, idx) => d.classList.toggle('active', idx === acIndex));
      document.getElementById('acHeaderSub').textContent = AC_SUBS[acIndex];
    }
    function acNext() { acGoTo((acIndex + 1) % acSlideCount()); }
    function acPause() { clearInterval(acTimer); }
    function acResume() { acTimer = setInterval(acNext, 6000); }
    acResume();

    // ── Drag/swipe do carrossel (Pointer Events: cobre touch e mouse) ──────
    (function initAcDrag() {
      const viewport = document.getElementById('acViewport');
      const track    = document.getElementById('acTrack');
      if (!viewport || !track) return;

      const DIR_LOCK_THRESHOLD    = 10;   // px para decidir o eixo do gesto
      const SWIPE_THRESHOLD_RATIO = 0.25; // 25% da largura do viewport
      const SWIPE_THRESHOLD_MIN_PX = 50;

      let dragging = false, axisLocked = false;
      let startX = 0, startY = 0, deltaX = 0, viewportWidth = 0, pointerId = null;

      function onPointerDown(e) {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        dragging = false; axisLocked = false; deltaX = 0;
        startX = e.clientX; startY = e.clientY;
        viewportWidth = viewport.getBoundingClientRect().width;
        pointerId = e.pointerId;
        acPause();
      }

      function onPointerMove(e) {
        if (pointerId === null || e.pointerId !== pointerId) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if (!axisLocked) {
          if (Math.abs(dx) < DIR_LOCK_THRESHOLD && Math.abs(dy) < DIR_LOCK_THRESHOLD) return;
          axisLocked = true;
          dragging = Math.abs(dx) > Math.abs(dy);
          if (dragging) {
            track.classList.add('ac-dragging');
            try { viewport.setPointerCapture(pointerId); } catch {}
          }
        }
        if (!dragging) return;

        e.preventDefault();
        deltaX = dx;

        const total = acSlideCount();
        let resistedDelta = deltaX;
        if ((acIndex === 0 && deltaX > 0) || (acIndex === total - 1 && deltaX < 0)) {
          resistedDelta = deltaX * 0.35;
        }
        const percent = (resistedDelta / viewportWidth) * 100;
        track.style.transform = `translateX(calc(-${acIndex * 100}% + ${percent}%))`;
      }

      function onPointerUp(e) {
        if (pointerId === null || e.pointerId !== pointerId) return;
        try { viewport.releasePointerCapture(pointerId); } catch {}
        pointerId = null;

        if (dragging) {
          track.classList.remove('ac-dragging');
          const thresholdPx = Math.max(viewportWidth * SWIPE_THRESHOLD_RATIO, SWIPE_THRESHOLD_MIN_PX);
          if (Math.abs(deltaX) > thresholdPx) {
            acGoTo(acIndex + (deltaX < 0 ? 1 : -1));
          } else {
            acGoTo(acIndex);
          }
        }
        dragging = false; axisLocked = false;
        acResume();
      }

      function onPointerCancel() {
        if (dragging) { track.classList.remove('ac-dragging'); acGoTo(acIndex); }
        dragging = false; axisLocked = false; pointerId = null;
        acResume();
      }

      viewport.addEventListener('pointerdown', onPointerDown);
      viewport.addEventListener('pointermove', onPointerMove, { passive: false });
      viewport.addEventListener('pointerup', onPointerUp);
      viewport.addEventListener('pointercancel', onPointerCancel);
    })();

    const SVG_PDF = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h5l5 5v9a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/><path d="M11 3v5h5"/><path d="M7 13h2c.55 0 1-.45 1-1v-1c0-.55-.45-1-1-1H7v4"/></svg>`;
    const SVG_DOC = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h5l5 5v9a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/><path d="M11 3v5h5"/><path d="M7 11h6M7 14h4"/></svg>`;
    const SVG_IMG = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="12" rx="1.5"/><circle cx="7.5" cy="8.5" r="1.5"/><path d="M3 14l4-4 3 3 2-2 5 5"/></svg>`;
    const SVG_FILE= `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h5l5 5v9a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/><path d="M11 3v5h5"/></svg>`;

    function iconeDoc(mime, nome) {
      if (!mime && nome) mime = nome.endsWith('.pdf') ? 'application/pdf' : '';
      if (mime?.includes('pdf'))   return { cls: 'icon-pdf',     svg: SVG_PDF };
      if (mime?.includes('image')) return { cls: 'icon-img',     svg: SVG_IMG };
      if (mime?.includes('word') || nome?.match(/\.docx?$/i)) return { cls: 'icon-doc', svg: SVG_DOC };
      return { cls: 'icon-default', svg: SVG_FILE };
    }

    async function baixarDoc(id, nome) {
      try {
        const res = await fetch(`${API_BASE_URL}/api/documentos/${id}/download`, { credentials: 'include' });
        if (!res.ok) { showToast('Erro ao baixar arquivo.', 'danger'); return; }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = nome || `documento_${id}`; a.click();
        URL.revokeObjectURL(url);
      } catch { showToast('Erro ao baixar arquivo.', 'danger'); }
    }

    async function carregarQuadroDeAvisos() {
      const hoje = new Date().toISOString().slice(0, 10);

      // Publicações em destaque
      try {
        const r = await fetch(`${API_BASE_URL}/api/documentos/destaque`, { credentials: 'include' });
        const lista = r.ok ? await r.json() : [];
        const el = document.getElementById('pubList');
        if (!lista.length) {
          el.innerHTML = '<div class="pub-vazio">Nenhuma publicação disponível no momento.</div>';
        } else {
          el.innerHTML = lista.map(d => {
            const icon = iconeDoc(d.arquivo_mime, d.arquivo_nome);
            return `
            <div class="pub-item" role="button" tabindex="0" title="Baixar ${d.titulo}"
                 onclick="baixarDoc(${d.id}, '${d.arquivo_nome}')"
                 onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();baixarDoc(${d.id}, '${d.arquivo_nome}');}">
              <div class="pub-icon ${icon.cls}">${icon.svg}</div>
              <div class="pub-titulo" title="${d.titulo}">${d.titulo}</div>
            </div>`;
          }).join('');
        }
      } catch {}

      // Extras de hoje (resumo — sem valores/telefone, isso fica só em extras.html)
      try {
        const r = await fetch(`${API_BASE_URL}/api/extras/dia/${hoje}`, { credentials: 'include' });
        const el = document.getElementById('extrasResumo');
        if (r.ok) {
          const d = await r.json();
          const nomes = (d.vagas || []).map(v => v.nome);
          const visiveis = nomes.slice(0, 4);
          const resto = nomes.length - visiveis.length;
          el.innerHTML = `
            <div class="ac-resumo-titulo">${d.vagas.length}/${d.total_vagas} vaga(s) de extra preenchida(s) hoje</div>
            <div class="ac-resumo-pills">
              ${visiveis.map(n => `<span class="pub-badge">${n}</span>`).join('') || '<span style="color:var(--color-hint);font-size:0.8rem;">Nenhum plantão lançado hoje.</span>'}
              ${resto > 0 ? `<span class="pub-badge">+${resto}</span>` : ''}
            </div>`;
        } else {
          el.innerHTML = '<div class="pub-vazio">Não foi possível carregar os extras de hoje.</div>';
        }
      } catch { document.getElementById('extrasResumo').innerHTML = '<div class="pub-vazio">Não foi possível carregar os extras de hoje.</div>'; }

      // Escala de hoje (resumo — patrulha ativa + administrativo, nunca o mês inteiro)
      try {
        const r = await fetch(`${API_BASE_URL}/api/escala/hoje?data=${hoje}`, { credentials: 'include' });
        const el = document.getElementById('escalaResumo');
        if (r.ok) {
          const d = await r.json();
          if (!d.publicado) {
            el.innerHTML = '<div class="pub-vazio">Escala do mês ainda não publicada.</div>';
          } else {
            const nomes = [...(d.equipe || []), ...(d.administrativo || [])].map(i => i.nome);
            const visiveis = nomes.slice(0, 6);
            const resto = nomes.length - visiveis.length;
            el.innerHTML = `
              <div class="ac-resumo-pills">
                ${visiveis.map(n => `<span class="pub-badge">${n}</span>`).join('')}
                ${resto > 0 ? `<span class="pub-badge">+${resto}</span>` : ''}
              </div>`;
          }
        } else {
          el.innerHTML = '<div class="pub-vazio">Não foi possível carregar a escala de hoje.</div>';
        }
      } catch { document.getElementById('escalaResumo').innerHTML = '<div class="pub-vazio">Não foi possível carregar a escala de hoje.</div>'; }
    }

    document.addEventListener('click', e => {
      const overlay = document.getElementById('pg-overlay');
      const closeBtn = document.getElementById('pg-modal-close');
      if (overlay && e.target === overlay && closeBtn && closeBtn.style.display !== 'none') closePageModal();
    });

    (async function start() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/auth/me`, { credentials: 'include' });
        if (res.ok) {
          const perfil = await res.json();
          sessionStorage.setItem('perfil', JSON.stringify(perfil));
          window.aposLoginSucesso(perfil);
          return;
        }
      } catch {}

      // Sem sessão: se o sistema ainda não tem nenhum usuário, leva direto à
      // criação do admin em vez de um login sem saída (primeiro acesso ou banco
      // recém-provisionado). Ver GET /api/auth/setup-status no backend.
      try {
        const s = await fetch(`${API_BASE_URL}/api/auth/setup-status`, { credentials: 'include' });
        if (s.ok && (await s.json()).needsSetup) {
          window.location.href = '/pages/setup.html';
          return;
        }
      } catch {}

      buildSidebarNav('');
      openLoginModal();
    })();
  </script>
</body>
