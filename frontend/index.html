<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Registro de BO - Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="header">
    <img src="/brasao-gcm.png" alt="Brasão GCM" class="logo">
    <h1>Sistema de Registro de BO</h1>
    <img src="/brasao-prefeitura.png" alt="Brasão Prefeitura" class="logo">
  </header>

  <main class="login-container">
    <h2>Login</h2>
    <form onsubmit="login(); return false;">
      <input type="text" id="usuario" placeholder="Usuário" required>
      <input type="password" id="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
    <p style="font-size:0.82rem;color:#888;text-align:center;margin-top:8px;">Esqueceu a senha? Contate o administrador do sistema.</p>
  </main>

  <!-- ✅ IMPORTANTE: Carregar config ANTES de main.js -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
